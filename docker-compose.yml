services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: promoai-postgres
    environment:
      POSTGRES_USER: promoai
      POSTGRES_PASSWORD: promoai
      POSTGRES_DB: campaign
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./infra/db/migrations/006_seasonal_contexts.sql:/docker-entrypoint-initdb.d/006_seasonal_contexts.sql:ro
      - ./infra/db/migrations/007_auto_trends.sql:/docker-entrypoint-initdb.d/007_auto_trends.sql:ro
    networks:
      - promoai-network

  redis:
    image: redis:7
    container_name: promoai-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - promoai-network

  context-service:
    build:
      context: ./services/context-service
      dockerfile: Dockerfile
    container_name: promoai-context-service
    environment:
      POSTGRES_USER: promoai
      POSTGRES_PASSWORD: promoai
      POSTGRES_DB: campaign
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CONTEXT_SERVICE_PORT: 3005
      CONTEXT_SYNC_CRON: "0 1 * * *"
    ports:
      - "3005:3005"
    depends_on:
      - postgres
    networks:
      - promoai-network
    restart: unless-stopped

  trend-detection-service:
    build:
      context: ./services/trend-detection-service
      dockerfile: Dockerfile
    container_name: promoai-trend-detection
    environment:
      POSTGRES_USER: promoai
      POSTGRES_PASSWORD: promoai
      POSTGRES_DB: campaign
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NEWS_API_KEY: ${NEWS_API_KEY}
      TREND_DETECTION_PORT: 3006
      TREND_API_CHOICE: newsapi
      TREND_DETECTION_COUNTRY: tr
      TREND_VOLUME_THRESHOLD: 30000
      TREND_RELEVANCE_THRESHOLD: 0.18
      TREND_CATEGORY_SIMILARITY_THRESHOLD: 0.15
      CONTEXT_SERVICE_URL: http://context-service:3005
    ports:
      - "3006:3006"
    depends_on:
      - postgres
      - context-service
    networks:
      - promoai-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  promoai-network:
    driver: bridge
