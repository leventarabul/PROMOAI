services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: promoai-postgres
    environment:
      POSTGRES_USER: promoai
      POSTGRES_PASSWORD: promoai
      POSTGRES_DB: campaign
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  redis:
    image: redis:7
    container_name: promoai-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
